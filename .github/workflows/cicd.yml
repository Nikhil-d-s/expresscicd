name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20   

      - name: Install dependencies
        run: npm install

      - name: Run app test (basic)
        run: |
          node index.js &
          sleep 5
          curl http://localhost:4000/health   

      - name: Build Docker image
        run: docker build -t ca2cicd .

      - name: Run Docker container
        run: |
          docker run -d -p 4000:4000 ca2cicd   
          sleep 5
          curl http://localhost:4000/health